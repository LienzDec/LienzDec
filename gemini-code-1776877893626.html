<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LienzDec | Catálogo Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="Logo LienzDec blanco.png" alt="LienzDec" class="logo">
        </div>
        
        <div class="filter-bar">
            <input type="text" id="searchInput" placeholder="Buscar por ID o nombre...">
            <select id="colorFilter">
                <option value="all">Todos los Tonos</option>
                <option value="dorado">Dorado / Oro</option>
                <option value="gris">Gris / Negro / Blanco</option>
            </select>
        </div>
    </header>

    <main class="catalog-container" id="catalog">
        </main>

    <footer>
        <p>© 2026 LienzDec - Arte impreso en Guadalajara para todo México.</p>
        <p>Calidad Premium en Canvas, Sarga y Terciopelo.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
